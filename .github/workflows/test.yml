name: CI
on: [push]
jobs:
  linters:
    name: Linters
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (linters)
        uses: actions/checkout@v4

      - name: Setup Ruby (linters)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.1
          bundler-cache: true

      - name: Run linters
        run: bin/rubocop --parallel

      - name: Run code metric tools
        run: bundle exec rails_best_practices

      - name: Run brakeman metric tools
        run: bundle exec brakeman

  tests:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432
      mongo:
        image: mongo:8
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
      - name: Checkout code (tests)
        uses: actions/checkout@v4

      - name: Setup Ruby (tests)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.1
          bundler-cache: true

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install and build assets
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm build
          bundle exec rails tailwindcss:build

      - name: Ensure gems are available for Playwright compatibility check
        run: bundle check || bundle install

      - name: Install Playwright browsers
        run: |
          PLAYWRIGHT_VERSION=$(bundle exec ruby -e "require 'playwright'; puts Playwright::COMPATIBLE_PLAYWRIGHT_VERSION")
          npx "playwright@$PLAYWRIGHT_VERSION" install --with-deps chromium

      - name: Install library for postgres
        run: sudo apt-get install libpq-dev

      - name: Wait for MongoDB service
        run: |
          ruby -e 'require "socket"; 30.times { begin; TCPSocket.new("localhost", 27017).close; exit 0; rescue StandardError; sleep 1; end }; abort "MongoDB did not become ready in time"'

      - name: Setup Database
        run: |
          bundle exec rails db:setup
        env:
          POSTGRES_USERNAME: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_PORT: 5432
          UPLOADCARE_PUBLIC_KEY: demopublickey
          UPLOADCARE_SECRET_KEY: demoprivatekey
          MONGODB_HOST: localhost:27017
          RAILS_ENV: test

      - name: Run tests
        run: |
          bundle exec rspec
        env:
          POSTGRES_USERNAME: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_PORT: 5432
          UPLOADCARE_PUBLIC_KEY: demopublickey
          UPLOADCARE_SECRET_KEY: demoprivatekey
          MONGODB_HOST: localhost:27017
          RAILS_ENV: test
